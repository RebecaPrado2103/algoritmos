<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CRUD Filme</title>
</head>

<body>

   <h1>Cadastro de Filmes</h1>

   <label for="inputId">Id</label>
   <input type="text" name="inputId" id="inputId">
   <input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
   <input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
   <input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
   <input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
   <br><br>

   <label for="inputTitulo">Título</label>
   <input type="text" name="inputTitulo" id="inputTitulo">
   <br>
   <label for="inputDiretor">Diretor</label>
   <input type="text" name="inputDiretor" id="inputDiretor">
   <br>
   <label for="inputdataDeLancamento">Data de lançamento</label>
   <input type="date" name="inputdataDeLancamento" id="inputdataDeLancamento">
   <br>
   <label for="inputAvaliacao">Avaliação</label>
   <input type="number" name="inputAvaliacao" id="inputAvaliacao">
   <br>

   <br><br>
   <div id="divAviso" style="background-color: rgb(245, 128, 239);"></div>
   <br>
   <input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
   <input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
   <br><br>
   <!-- <input type="button" value="Listar" onclick="listar()">
    <br><br> -->

   <div id="outputSaida" style="background-color: rgb(126, 242, 106);">...</div>

   <input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
   <input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
   <br>
   <p>Filtrar por avaliação acima de oito</p>
   <br>
   <input type="button" value="Filtrar" id="Filtrar" onclick="filtrarPorAvaliacao()">
   <script src="./Filme.js"></script>
   <script src="./FilmeControle.js"></script>
</body>

</html>
