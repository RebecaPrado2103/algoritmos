<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CRUD Papelaria</title>
</head>

<body>

   <h1>Cadastro de produtos de papelaria</h1>

   <label for="inputId">Id</label>
   <input type="text" name="inputId" id="inputId">
   <input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
   <input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
   <input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
   <input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
   <br><br>

   <label for="inputNome">Nome</label>
   <input type="text" name="inputNome" id="inputNome">
   <br>
   <label for="Categoria">Categoria</label>
   <select id="Categoria">
        <option value="">-- Selecione uma categoria --</option>
        <option value="caderno">Caderno</option>
        <option value="caneta">Caneta</option>
        <option value="lapis">Lápis</option>
        <option value="borracha">Borracha</option>
    </select>
   <br>
   <label for="inputquantidadeEstoque">Quantidade do estoque</label>
   <input type="number" name="inputquantidadeEstoque" id="inputquantidadeEstoque">
   <br>
   <label for="inputprecoUnitario">Preço Unitário</label>
   <input type="number" name="inputprecoUnitario" id="inputprecoUnitario">
   <br>

   <br><br>
   <div id="divAviso" style="background-color: rgb(117, 210, 238);"></div>
   <br>
   <input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
   <input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
   <br><br>
   <!-- <input type="button" value="Listar" onclick="listar()">
    <br><br> -->

   <div id="outputSaida" style="background-color: rgb(231, 104, 195);">...</div>
   <br>

   <label for="categoria">Categoria filtragem</label>
   <select id="categoria" onchange="filtrarPorCategoria()">
        <option value="">-- Selecione uma categoria --</option>
        <option value="caderno">caderno</option>
        <option value="caneta">caneta</option>
        <option value="lapis">lápis</option>
        <option value="borracha">borracha</option>
    </select>
    
   <input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
   <input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
   <script src="./Papelaria.js"></script>
   <script src="./PapelariaControle.js"></script>
</body>

</html>
