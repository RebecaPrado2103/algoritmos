<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CRUD Imovel</title>
</head>

<body>

   <h1>Cadastro de Imovel</h1>

   <label for="inputnumMatricula">Número da Matricula:</label>
   <input type="number" name="inputnumMatricula" id="inputnumMatricula">
   <input type="button" value="Procure" id="btProcure" onclick="procure()" style="display:inline;">
   <input type="button" value="Inserir" id="btInserir" onclick="inserir()" style="display:none;">
   <input type="button" value="Alterar" id="btAlterar" onclick="alterar()" style="display:none;">
   <input type="button" value="Excluir" id="btExcluir" onclick="excluir()" style="display:none;">
   <br><br>

   <label for="inputEndereco">Endereço:</label>
   <input type="text" name="inputEndereco" id="inputEndereco">
   <br>
   <label for="inputBairro">Bairro:</label>
   <select id="inputBairro">
        <option value="">-- Selecione uma opção --</option>
        <option value="Jardim Capricornio">Jardim Capricórnio</option>
        <option value="Parigo">Parigo</option>
        <option value="Flórida I">Flórida I</option>
        <option value="Flórida II">Flórida II</option>
        <option value="Campo Rural">Campo Rural</option>
   </select>
   <br>
   <label for="inputTipo">Tipo:</label>
   <select id="inputTipo">
        <option value="">-- Selecione uma opção --</option>
        <option value="residencial">residencial</option>
        <option value="comercial">comercial</option>
        <option value="rural">rural</option>
   </select>
   <br>
   <label for="inputArea">Area:</label>
   <input type="number" name="inputArea" id="inputArea">
   <br>
   <label for="inputComodos">Comodos:</label>
   <input type="number" name="inputComodos" id="inputComodos">
   <br>
   <label for="inputAlugado">Alugado:</label>
   <input type="checkbox" name="inputAlugado" id="inputAlugado">
   <br>
   <label for="inputData">Data de conclusão da construção:</label>
   <input type="date" name="inputData" id="inputData">
   <br>

   <br><br>
   <div id="divAviso" style="background-color: rgb(54, 246, 51);"></div>
   <br>
   <input type="button" value="Salvar" id="btSalvar" onclick="salvar()" style="display:none;">
   <input type="button" value="Cancelar" id="btCancelar" onclick="cancelarOperacao()" style="display:none;">
   <br><br>
   <!-- <input type="button" value="Listar" onclick="listar()">
    <br><br> -->

   <div id="outputSaida" style="background-color: rgb(218, 93, 243);">...</div>

   <input type="button" value="Persistir" id="btPersisitir" onclick="prepararESalvarCSV()">
   <input type="button" value="Recuperar" id="btRecuperar" onclick="abrirArquivoSalvoEmLocalPermanente()">
   <script src="./Imovel.js"></script>
   <script src="./ImovelControle.js"></script>
</body>

</html>
