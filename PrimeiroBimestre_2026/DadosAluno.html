<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados de um Aluno</title>
    <link rel="stylesheet" href="DadosAluno.css">
</head>

<body>

    <header>
        Site para mostrar certos dados de um aluno
    </header>

    <main>
        <section>
            <h1>Dados de um Aluno</h1>

            <label for="inputRA">RA</label>
            <input type="text" id="inputRA">
            <br>

            <label for="inputNome">Nome</label>
            <input type="text" id="inputNome">
            <br>

            <label for="inputNota1">Nota da prova 1</label>
            <input type="number" id="inputNota1">
            <br>

            <label for="inputNota2">Nota da prova 2</label>
            <input type="number" id="inputNota2">
            <br>

            <label for="inputNota3">Nota da prova 3</label>
            <input type="number" id="inputNota3">
            <br>

            <label for="inputNota4">Nota da prova 4</label>
            <input type="number" id="inputNota4">
            <br>

            <label for="inputME">Média dos exercícios</label>
            <input type="number" id="inputME">
            <br>

            <button onclick="funcaoCalcularAproveitamento()">Calcular Aproveitamento</button>

            <div class="resultado">
                <p><strong>Dados do Aluno:</strong> <span id="resultado">0</span></p>
            </div>
        </section>
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>


    <script src="DadosAluno.js"></script>

</body>

</html>
