<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculo de IMC</title>
    <link rel="stylesheet" href="IMC.css">
</head>
<body>
    <header>
        Site para calcular IMC
    </header>

    <main>
        <section>
            <h1>Calculo de IMC</h1>

            <label for="inputPeso" id="labelDoInputPeso">Peso (em kg)</label>
            <input type="number" id="inputPeso" name="inputPeso">

            <label for="inputAltura">Altura (em metros)</label>
            <input type="number" id="inputAltura" name="inputAltura">

            <button onclick="CalcularIMC()">Calcular</button>

            <div class="resultado">
                <p><strong>IMC:</strong><span id="respIMC"></span></p>
                <p><strong>Classificação:</strong><span id="respClassific"></span></p>
            </div>
        </section>
    </main>

    <footer id="footer">
        <span id="mensagem">Preencha os valores e calcule</span>
    </footer>

    <script src="IMC.js"></script>
</body>
</html>
